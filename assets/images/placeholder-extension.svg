<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A8C8E0"/>
      <stop offset="100%" stop-color="#D0E8F4"/>
    </linearGradient>
  </defs>
  <rect width="900" height="500" fill="url(#sky)"/>
  <!-- Ground -->
  <rect x="0" y="400" width="900" height="100" fill="#7A9060"/>
  <!-- Original house -->
  <rect x="100" y="220" width="360" height="200" fill="#D4C8B0"/>
  <polygon points="80,220 280,100 480,220" fill="#6B5232"/>
  <!-- Extension (new part) -->
  <rect x="460" y="280" width="300" height="140" fill="#E4D8C0"/>
  <polygon points="440,280 610,180 780,280" fill="#8B7040"/>
  <!-- Connection indicator -->
  <line x1="460" y1="280" x2="460" y2="420" stroke="#C4922A" stroke-width="4" stroke-dasharray="8,5" opacity="0.8"/>
  <!-- Large window on extension -->
  <rect x="490" y="310" width="120" height="80" rx="3" fill="#B8D8EC"/>
  <line x1="550" y1="310" x2="550" y2="390" stroke="white" stroke-width="2"/>
  <line x1="490" y1="350" x2="610" y2="350" stroke="white" stroke-width="2"/>
  <!-- Door original -->
  <rect x="225" y="330" width="60" height="90" rx="3" fill="#8B6914"/>
  <!-- Windows original -->
  <rect x="130" y="265" width="75" height="60" rx="3" fill="#A8C8DC"/>
  <rect x="320" y="265" width="75" height="60" rx="3" fill="#A8C8DC"/>
  <!-- Trees -->
  <polygon points="820,400 850,310 880,400" fill="#3A5A2A"/>
</svg>
