<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C8D8E8"/>
      <stop offset="100%" stop-color="#E0EAF0"/>
    </linearGradient>
  </defs>
  <rect width="900" height="500" fill="url(#sky)"/>
  <!-- Ground -->
  <rect x="0" y="400" width="900" height="100" fill="#8A9470"/>
  <!-- Driveway -->
  <polygon points="300,500 600,500 550,400 350,400" fill="#B0A898"/>
  <!-- Garage body -->
  <rect x="180" y="200" width="540" height="220" fill="#D8D0C4"/>
  <!-- Pitched roof -->
  <polygon points="160,200 450,80 740,200" fill="#7A6A50"/>
  <!-- Garage doors (double) -->
  <rect x="210" y="250" width="195" height="170" rx="2" fill="#B8B0A4"/>
  <rect x="420" y="250" width="195" height="170" rx="2" fill="#B8B0A4"/>
  <!-- Door panels -->
  <g stroke="#A0988C" stroke-width="2" fill="none">
    <line x1="210" y1="295" x2="405" y2="295"/>
    <line x1="210" y1="340" x2="405" y2="340"/>
    <line x1="210" y1="385" x2="405" y2="385"/>
    <line x1="420" y1="295" x2="615" y2="295"/>
    <line x1="420" y1="340" x2="615" y2="340"/>
    <line x1="420" y1="385" x2="615" y2="385"/>
  </g>
  <!-- Door handles -->
  <circle cx="400" cy="340" r="6" fill="#C4922A"/>
  <circle cx="423" cy="340" r="6" fill="#C4922A"/>
  <!-- Loft window -->
  <rect x="380" y="130" width="140" height="70" rx="4" fill="#A8C0D4"/>
  <line x1="450" y1="130" x2="450" y2="200" stroke="white" stroke-width="2"/>
  <!-- Chimney -->
  <rect x="560" y="88" width="35" height="65" fill="#6B5A40"/>
</svg>
