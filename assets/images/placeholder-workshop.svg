<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1000" viewBox="0 0 800 1000">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4A882"/>
      <stop offset="100%" stop-color="#A0896A"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#g)"/>
  <!-- Workshop wall -->
  <rect x="0" y="0" width="800" height="1000" fill="#8B7355" opacity="0.3"/>
  <!-- Tool silhouettes -->
  <g fill="#5C4A30" opacity="0.5">
    <!-- Hammer -->
    <rect x="150" y="200" width="80" height="20" rx="4"/>
    <rect x="170" y="220" width="12" height="160" rx="3"/>
    <!-- Saw -->
    <rect x="400" y="180" width="200" height="14" rx="3"/>
    <path d="M400,194 L410,220 M420,194 L430,220 M440,194 L450,220 M460,194 L470,220 M480,194 L490,220 M500,194 L510,220 M520,194 L530,220 M540,194 L550,220 M560,194 L570,220 M580,194 L590,220" stroke="#5C4A30" stroke-width="2"/>
    <!-- Level -->
    <rect x="100" y="500" width="300" height="30" rx="8"/>
    <circle cx="250" cy="515" r="10" fill="none" stroke="#C4922A" stroke-width="3"/>
  </g>
  <!-- Wood planks -->
  <g fill="#6B5232" opacity="0.4">
    <rect x="50" y="700" width="700" height="40" rx="4"/>
    <rect x="50" y="755" width="700" height="40" rx="4"/>
    <rect x="50" y="810" width="700" height="40" rx="4"/>
  </g>
  <!-- Light beam -->
  <polygon points="300,0 500,0 650,1000 150,1000" fill="white" opacity="0.05"/>
  <!-- Label -->
  <text x="400" y="450" font-family="Georgia,serif" font-size="28" fill="white" opacity="0.5" text-anchor="middle">Handverkstad</text>
</svg>
