<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#D4C8B4"/>
  <!-- House under renovation -->
  <rect x="150" y="180" width="600" height="280" fill="#C4B89A"/>
  <polygon points="130,180 450,60 770,180" fill="#7A6040"/>
  <!-- Scaffolding -->
  <g stroke="#8B7355" stroke-width="4" fill="none" opacity="0.7">
    <line x1="130" y1="60" x2="130" y2="460"/>
    <line x1="230" y1="60" x2="230" y2="460"/>
    <line x1="130" y1="120" x2="230" y2="120"/>
    <line x1="130" y1="200" x2="230" y2="200"/>
    <line x1="130" y1="280" x2="230" y2="280"/>
    <line x1="130" y1="360" x2="230" y2="360"/>
    <line x1="670" y1="60" x2="670" y2="460"/>
    <line x1="770" y1="60" x2="770" y2="460"/>
    <line x1="670" y1="120" x2="770" y2="120"/>
    <line x1="670" y1="200" x2="770" y2="200"/>
    <line x1="670" y1="280" x2="770" y2="280"/>
    <line x1="670" y1="360" x2="770" y2="360"/>
  </g>
  <!-- Scaffolding planks -->
  <g fill="#A08060" opacity="0.7">
    <rect x="130" y="115" width="100" height="10" rx="2"/>
    <rect x="130" y="195" width="100" height="10" rx="2"/>
    <rect x="130" y="275" width="100" height="10" rx="2"/>
    <rect x="670" y="115" width="100" height="10" rx="2"/>
    <rect x="670" y="195" width="100" height="10" rx="2"/>
    <rect x="670" y="275" width="100" height="10" rx="2"/>
  </g>
  <!-- Windows -->
  <rect x="280" y="240" width="100" height="80" rx="3" fill="#9BB8CC"/>
  <rect x="520" y="240" width="100" height="80" rx="3" fill="#9BB8CC"/>
  <!-- Door -->
  <rect x="390" y="360" width="80" height="100" rx="3" fill="#7A6040"/>
  <!-- Ground -->
  <rect x="0" y="460" width="900" height="40" fill="#8B7A5A"/>
  <!-- Construction materials on ground -->
  <g fill="#A0906A" opacity="0.6">
    <rect x="180" y="440" width="80" height="20" rx="2"/>
    <rect x="190" y="425" width="70" height="18" rx="2"/>
    <rect x="620" y="440" width="80" height="20" rx="2"/>
  </g>
</svg>
